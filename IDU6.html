<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IDU6 - Flight Terminal</title>
    <style>
        /* 基础样式 */
        body { margin: 0; background-color: #000; color: #fff; font-family: "Segoe UI", Roboto, sans-serif; display: flex; height: 100vh; overflow: hidden; user-select: none; }

        /* 左侧面板：35% / 65% 布局 */
        #left-half { width: 50vw; height: 100vh; border-right: 1px solid #333; display: flex; flex-direction: column; background: #0a0a0a; position: relative; }
        
        #top-area { height: 40%; border-bottom: 2px solid #2a2a2a; display: flex; flex-direction: column; }
        .tab-header { display: flex; background: #151515; align-items: stretch; }
        
        /* IDU6 标识 */
        .idu-logo { padding: 0 15px; display: flex; align-items: center; justify-content: center; color: #00e5ff; font-weight: 900; font-size: 18px; font-style: italic; background: #050505; border-right: 1px solid #333; letter-spacing: 2px; }
        
        .tab-btn { flex: 1; padding: 12px 0; background: transparent; color: #555; border: none; border-bottom: 3px solid transparent; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { color: #00e5ff; border-bottom: 3px solid #00e5ff; background: #1a1a1a; }
        .tab-content { flex: 1; padding: 15px; overflow-y: auto; }
        .pane { display: none; }
        .pane.active { display: block; }

        /* 表单样式 */
        .form-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 1px solid #1a1a1a; padding-bottom: 8px; }
        .form-label { color: #aaa; font-size: 16px; font-weight: bold; }
        .form-input { background: #111; border: 1px solid #333; color: #00e5ff; padding: 8px; font-size: 18px; border-radius: 4px; width: 100px; text-align: right; font-family: monospace; }
        .form-input:focus { border-color: #00e5ff; outline: none; background: #1a1a1a; }
        .calc-result { color: #aaa; font-size: 22px; font-weight: bold; font-family: monospace; width: 100px; text-align: right; }

        /* 底部日志区 */
        #bottom-area { height: 60%; display: flex; flex-direction: column; position: relative; }
        .log-title { padding: 8px 15px; background: #111; color: #888; font-size: 14px; font-weight: bold; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        
        /* 航班重置按钮 (红灰机械感) */
        .reset-btn { background: linear-gradient(180deg, #5a1a1a 0%, #3a0000 100%); color: #ffaaaa; border: 1px solid #220000; border-top: 1px solid #883333; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; box-shadow: 0 3px 0 #1a0000; transition: transform 0.05s, box-shadow 0.05s; }
        .reset-btn:active { transform: translateY(3px); box-shadow: 0 0 0 #1a0000; background: #3a0000; }

        #log-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 40px; }
        .log-item { display: flex; justify-content: space-between; align-items: center; background: #151515; padding: 12px 15px; border-left: 4px solid #00e5ff; border-radius: 4px; border: 1px solid #222; border-left-width: 4px; }
        .log-cmd { font-size: 20px; font-weight: bold; color: #fff; }
        .log-time { font-size: 14px; color: #666; font-family: monospace; }

        /* 版权水印 */
        .copyright-watermark { position: absolute; bottom: 10px; left: 0; width: 100%; text-align: center; color: #333; font-size: 12px; font-weight: bold; font-family: monospace; pointer-events: none; }

        /* --- 右侧输入面板 --- */
        #right-half { width: 50vw; height: 100vh; display: flex; flex-direction: column; padding: 15px; box-sizing: border-box; background: #000; }
        
        /* 草稿栏：改为青色 */
        #draft-bar { height: 60px; background: #080808; border: 2px solid #222; margin-bottom: 20px; display: flex; align-items: center; padding: 0 15px; font-size: 32px; font-weight: bold; color: #00e5ff; letter-spacing: 2px; border-radius: 6px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.8); }
        
        /* 棕色底座 */
        .btn-container { background-color: #2b201c; padding: 12px; border-radius: 10px; border: 1px solid #1a1210; display: grid; }
        
        /* 核心修改：极致 3D 机械按钮 */
        button.key-btn { 
            background: linear-gradient(180deg, #444 0%, #222 100%); 
            color: #fff; 
            border: 1px solid #111; 
            border-top: 1px solid #666; /* 顶部高光 */
            border-radius: 6px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            /* 产生厚度的阴影 */
            box-shadow: 0 6px 0 #0d0d0d, 0 8px 5px rgba(0,0,0,0.6); 
            transition: transform 0.05s, box-shadow 0.05s, background 0.05s;
            margin-bottom: 6px; /* 为阴影留出空间 */
        }
        
        /* 点击时的按压效果 */
        button.key-btn:active { 
            transform: translateY(6px); 
            box-shadow: 0 0 0 #0d0d0d, 0 1px 2px rgba(0,0,0,0.4); 
            background: linear-gradient(180deg, #222 0%, #111 100%); 
            border-top: 1px solid #333;
        }

        #action-row { display: grid; grid-template-columns: 1fr 1fr 2fr; gap: 12px; margin-bottom: 15px; }
        #action-row button { height: 60px; }
        /* 取消确认键的绿色，保持统一白色字体，但可以稍微加深一点背景以示区分 */
        .confirm-btn { background: linear-gradient(180deg, #333 0%, #151515 100%) !important; color: #fff !important; }

        #letter-grid { grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 15px; }
        #letter-grid button { height: 45px; }

        #bottom-input-area { display: grid; grid-template-columns: 1.5fr 1fr; gap: 15px; flex: 1; }
        #num-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
        #num-grid button { height: 55px; }
        
        #d-pad { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 8px; }
        .d-up { grid-column: 2; grid-row: 1; }
        .d-left { grid-column: 1; grid-row: 2; }
        .d-right { grid-column: 3; grid-row: 2; }
        .d-down { grid-column: 2; grid-row: 3; }
        
        .dct-icon { width: 35px; height: 25px; }

        /* --- 响应式悬浮窗/分屏状态 (针对 11寸 iPad 优化) --- */
        @media (max-width: 800px) {
            body { flex-direction: column; }
            #left-half { width: 100vw; height: 35vh; border-right: none; border-bottom: 2px solid #222; }
            #top-area { height: 55%; } 
            #bottom-area { height: 45%; }
            .log-item { padding: 8px 10px; border-left-width: 3px; } 
            .log-cmd { font-size: 16px; }
            .form-row { margin-bottom: 6px; padding-bottom: 4px; }
            .form-label { font-size: 14px; }
            .form-input { padding: 4px; font-size: 14px; height: 20px; width: 70px; }
            .calc-result { font-size: 16px; width: 70px; }

            #right-half { width: 100vw; height: 65vh; padding: 10px; }
            #draft-bar { height: 45px; font-size: 22px; margin-bottom: 12px; }
            .btn-container { padding: 8px; border-radius: 8px; }
            #action-row { margin-bottom: 8px; gap: 8px; }
            #action-row button { height: 50px; margin-bottom: 4px; box-shadow: 0 4px 0 #0d0d0d; }
            #action-row button:active { transform: translateY(4px); }
            
            #letter-grid { gap: 6px; margin-bottom: 8px; }
            #letter-grid button { height: 38px; font-size: 16px; margin-bottom: 4px; box-shadow: 0 4px 0 #0d0d0d; }
            #letter-grid button:active { transform: translateY(4px); }
            
            #bottom-input-area { gap: 8px; }
            #num-grid { gap: 6px; }
            #num-grid button { height: 45px; margin-bottom: 4px; box-shadow: 0 4px 0 #0d0d0d; }
            #num-grid button:active { transform: translateY(4px); }
            
            #d-pad { gap: 4px; }
            .dct-icon { width: 28px; height: 20px; }
            .copyright-watermark { display: none; } /* 窄屏隐藏水印节省空间 */
        }
    </style>
</head>
<body>

    <div id="left-half">
        <div id="top-area">
            <div class="tab-header">
                <div class="idu-logo">IDU6</div>
                <button id="btn-overview" class="tab-btn active" onclick="switchTab('overview')">Overview</button>
                <button id="btn-takeoff" class="tab-btn" onclick="switchTab('takeoff')">Takeoff</button>
                <button id="btn-landing" class="tab-btn" onclick="switchTab('landing')">Landing</button>
            </div>
            <div class="tab-content">
                <div id="pane-overview" class="pane active">
                    <div class="form-row">
                        <span class="form-label">Flight No.</span>
                        <input type="text" id="flt-no" class="form-input clearable" placeholder="MU1234" style="text-transform: uppercase;">
                    </div>
                    <div class="form-row">
                        <span class="form-label">Transponder</span>
                        <input type="number" id="transponder" class="form-input clearable" placeholder="0000">
                    </div>
                    <div class="form-row">
                        <span class="form-label">Est Landing Fuel</span>
                        <input type="number" id="est-fuel" class="form-input clearable" placeholder="Tons">
                    </div>
                </div>

                <div id="pane-takeoff" class="pane">
                    <div class="form-row">
                        <span class="form-label">V1 / VR / V2 (Kts)</span>
                        <div style="display:flex; gap:5px;">
                            <input type="number" class="form-input clearable" style="width:40px;" placeholder="V1">
                            <input type="number" class="form-input clearable" style="width:40px;" placeholder="VR">
                            <input type="number" class="form-input clearable" style="width:40px;" placeholder="V2">
                        </div>
                    </div>
                    <div class="form-row">
                        <span class="form-label">Takeoff Weight (Tons)</span>
                        <input type="number" id="to-weight" class="form-input clearable" placeholder="TOW" oninput="calcTakeoff()">
                    </div>
                    <div class="form-row">
                        <span class="form-label">VF0</span>
                        <div id="to-vf0" class="calc-result">---</div>
                    </div>
                </div>

                <div id="pane-landing" class="pane">
                    <div class="form-row">
                        <span class="form-label">Landing Weight (Tons)</span>
                        <input type="number" id="ld-weight" class="form-input clearable" placeholder="LDW" oninput="calcLanding()">
                    </div>
                    <div class="form-row">
                        <span class="form-label">VREF + Δ VAPP = VAPP</span>
                        <div style="display:flex; gap:5px; align-items:center;">
                            <input type="number" id="vref" class="form-input clearable" style="width:45px;" placeholder="REF" oninput="calcLanding()">
                            <span style="color:#555;">+</span>
                            <input type="number" id="wind-corr" class="form-input clearable" style="width:35px;" placeholder="Δ" oninput="calcLanding()">
                        </div>
                    </div>
                    <div class="form-row">
                        <span class="form-label">VAPP</span>
                        <div id="vapp-speed" class="calc-result" style="color:#00e5ff;">---</div>
                    </div>
                    <div class="form-row">
                        <span class="form-label">VF0 Speed</span>
                        <div id="ga-vf0" class="calc-result">---</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="bottom-area">
            <div class="log-title">
                <span>COMMAND LOG</span>
                <button class="reset-btn" onclick="packAndReset()">Pack & Reset</button>
            </div>
            <div id="log-list"></div>
            <div class="copyright-watermark">© IDU6 FLIGHT SYSTEM</div>
        </div>
    </div>

    <div id="right-half">
        <div id="draft-bar"></div>
        <div id="action-row" class="btn-container">
            <button class="key-btn" onclick="addText(' Direct To ')">
                <svg class="dct-icon" viewBox="0 0 40 30">
                    <text x="2" y="24" font-family="Arial" font-weight="bold" font-size="28" fill="white">D</text>
                    <line x1="0" y1="15" x2="35" y2="15" stroke="white" stroke-width="3" />
                    <polygon points="32,10 40,15 32,20" fill="white" />
                </svg>
            </button>
            <button class="key-btn" onclick="backspace()">DEL</button>
            <button class="key-btn confirm-btn" onclick="confirmInput()">CONFIRM</button>
        </div>
        <div id="letter-grid" class="btn-container"></div>
        <div id="bottom-input-area">
            <div id="num-grid" class="btn-container"></div>
            <div id="d-pad" class="btn-container">
                <button class="key-btn d-up" onclick="addText('↑')">↑</button>
                <button class="key-btn d-left" onclick="addText('←')">←</button>
                <button class="key-btn d-right" onclick="addText('→')">→</button>
                <button class="key-btn d-down" onclick="addText('↓')">↓</button>
            </div>
        </div>
    </div>

    <script>
        // 通用公式：重量 * 2 + 70，最大限制 210
        function getVF0(weight) {
            if (!weight || weight <= 0) return "---";
            let speed = (weight * 2) + 70;
            return speed > 210 ? 210 : Math.round(speed);
        }

        function calcTakeoff() {
            const weight = parseFloat(document.getElementById('to-weight').value);
            document.getElementById('to-vf0').innerText = getVF0(weight);
        }

        function calcLanding() {
            const weight = parseFloat(document.getElementById('ld-weight').value);
            document.getElementById('ga-vf0').innerText = getVF0(weight);

            const vref = parseFloat(document.getElementById('vref').value) || 0;
            const delta = parseFloat(document.getElementById('wind-corr').value) || 0;
            if (vref > 0) {
                document.getElementById('vapp-speed').innerText = vref + delta;
            } else {
                document.getElementById('vapp-speed').innerText = "---";
            }
        }

        // 打包下载并重置逻辑 (动态文件名)
        function packAndReset() {
            const msg = "注意：点击确认将把本次 IDU6 中的飞行记录保存为文本文件至本地，并重置面板中的所有信息。\n\n是否确认执行 Pack & Reset？";
            if(confirm(msg)) {
                let logData = "====== IDU6 FLIGHT RECORD ======\n";
                logData += "Date: " + new Date().toLocaleDateString() + "\n\n";
                
                let rawFltNo = document.getElementById('flt-no').value.trim().toUpperCase();
                let safeFltNo = rawFltNo === "" ? "UNKNOWN" : rawFltNo;
                
                logData += "[ PRE-FLIGHT ]\n";
                logData += "Flight No: " + safeFltNo + "\n";
                logData += "Transponder: " + (document.getElementById('transponder').value || "N/A") + "\n";
                logData += "Est Landing Fuel: " + (document.getElementById('est-fuel').value || "N/A") + " Tons\n\n";
                
                logData += "[ COMMAND LOG ]\n";
                const logItems = document.querySelectorAll('.log-item');
                if (logItems.length === 0) {
                    logData += "No commands recorded.\n";
                } else {
                    let arr = Array.from(logItems).reverse();
                    arr.forEach(item => {
                        let time = item.querySelector('.log-time').innerText;
                        let cmd = item.querySelector('.log-cmd').innerText;
                        logData += time + " | " + cmd + "\n";
                    });
                }
                
                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                const dateString = `${yyyy}${mm}${dd}`;
                const fileName = `IDU6_${safeFltNo}_${dateString}.txt`;

                const blob = new Blob([logData], { type: "text/plain;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                a.click();
                URL.revokeObjectURL(url);

                document.querySelectorAll('.clearable').forEach(input => input.value = "");
                document.getElementById('to-vf0').innerText = "---";
                document.getElementById('ga-vf0').innerText = "---";
                document.getElementById('vapp-speed').innerText = "---";
                document.getElementById('log-list').innerHTML = "";
                currentInput = "";
                draftBar.innerText = "";
            }
        }

        // 键盘输入逻辑
        let currentInput = "";
        const draftBar = document.getElementById('draft-bar');

        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
        const letterGrid = document.getElementById('letter-grid');
        letters.forEach(l => {
            const btn = document.createElement('button');
            btn.className = "key-btn";
            btn.innerText = l;
            btn.onclick = () => addText(l);
            letterGrid.appendChild(btn);
        });

        const nums = ["1","2","3","4","5","6","7","8","9",".","0"];
        const numGrid = document.getElementById('num-grid');
        nums.forEach(n => {
            const btn = document.createElement('button');
            btn.className = "key-btn";
            btn.innerText = n;
            btn.onclick = () => addText(n);
            numGrid.appendChild(btn);
        });

        function addText(char) {
            currentInput += char;
            draftBar.innerText = currentInput;
        }

        function backspace() {
            currentInput = currentInput.slice(0, -1);
            draftBar.innerText = currentInput;
        }

        function confirmInput() {
            if (currentInput.trim() === "") return; 
            const now = new Date();
            const timeStr = String(now.getHours()).padStart(2, '0') + ":" + 
                            String(now.getMinutes()).padStart(2, '0') + ":" + 
                            String(now.getSeconds()).padStart(2, '0');
            const logEntry = `
                <div class="log-item">
                    <span class="log-cmd">${currentInput}</span>
                    <span class="log-time">${timeStr}</span>
                </div>
            `;
            document.getElementById('log-list').insertAdjacentHTML('afterbegin', logEntry);
            currentInput = "";
            draftBar.innerText = "";
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.pane').forEach(pane => pane.classList.remove('active'));
            document.getElementById('btn-' + tabId).classList.add('active');
            document.getElementById('pane-' + tabId).classList.add('active');
        }
    </script>
</body>
</html>
