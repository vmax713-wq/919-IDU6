<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>IDU6 - Flight Terminal</title>
    <style>
        /* 基础样式 */
        body { margin: 0; background-color: #000; color: #fff; font-family: "Segoe UI", Roboto, sans-serif; display: flex; height: 100vh; height: -webkit-fill-available; overflow: hidden; user-select: none; }
        html { height: -webkit-fill-available; }

        /* --- 默认全屏状态：左右排布 (50/50) --- */
        #left-half { width: 50vw; height: 100vh; border-right: 1px solid #333; display: flex; flex-direction: column; background: #0a0a0a; position: relative; }
        #right-half { width: 50vw; height: 100vh; display: flex; flex-direction: column; padding: 10px 15px; box-sizing: border-box; background: #000; }

        /* 左侧面板布局 */
        #top-area { height: 40%; border-bottom: 2px solid #2a2a2a; display: flex; flex-direction: column; }
        .tab-header { display: flex; background: #151515; align-items: stretch; }
        
        .idu-logo { padding: 0 15px; display: flex; align-items: center; justify-content: center; color: #00e5ff; font-weight: 900; font-size: 18px; font-style: italic; background: #050505; border-right: 1px solid #333; letter-spacing: 2px; }
        
        .tab-btn { flex: 1; padding: 10px 0; background: transparent; color: #555; border: none; border-bottom: 3px solid transparent; font-size: 16px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { color: #00e5ff; border-bottom: 3px solid #00e5ff; background: #1a1a1a; }
        .tab-content { flex: 1; padding: 12px; overflow-y: auto; }
        .pane { display: none; }
        .pane.active { display: block; }

        .form-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid #1a1a1a; padding-bottom: 6px; }
        .form-label { color: #aaa; font-size: 16px; font-weight: bold; }
        .form-input { background: #111; border: 1px solid #333; color: #00e5ff; padding: 6px 8px; font-size: 18px; border-radius: 4px; width: 100px; text-align: right; font-family: monospace; }
        .form-input:focus { border-color: #00e5ff; outline: none; background: #1a1a1a; }
        .calc-result { color: #aaa; font-size: 22px; font-weight: bold; font-family: monospace; width: 100px; text-align: right; }

        #bottom-area { height: 60%; display: flex; flex-direction: column; position: relative; transition: all 0.2s; }
        .log-title { padding: 6px 15px; background: #111; color: #888; font-size: 14px; font-weight: bold; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        
        .reset-btn { background: linear-gradient(180deg, #5a1a1a 0%, #3a0000 100%); color: #ffaaaa; border: 1px solid #220000; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 14px; box-shadow: 0 3px 0 #1a0000; }
        .reset-btn:active { transform: translateY(3px); box-shadow: 0 0 0 #1a0000; background: #3a0000; }

        #log-list { flex: 1; overflow-y: auto; padding: 10px 15px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 30px; }
        .log-item { display: flex; justify-content: space-between; align-items: center; background: #151515; padding: 10px 12px; border-left: 3px solid #00e5ff; border-radius: 4px; border: 1px solid #222; border-left-width: 3px; }
        .log-cmd { font-size: 18px; font-weight: bold; color: #fff; }
        .log-time { font-size: 12px; color: #666; font-family: monospace; }

        .copyright-watermark { position: absolute; bottom: 8px; left: 0; width: 100%; text-align: center; color: #333; font-size: 12px; font-weight: bold; font-family: monospace; pointer-events: none; }

        /* --- 右侧输入面板 --- */
        
        /* 草稿栏与确认键组合 */
        .draft-action-bar { display: flex; gap: 10px; margin-bottom: 12px; }
        #draft-bar { flex-grow: 1; height: 50px; box-sizing: border-box; background: #080808; border: 2px solid #222; display: flex; align-items: center; padding: 0 15px; font-size: 32px; font-weight: bold; color: #00e5ff; letter-spacing: 2px; border-radius: 6px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.8); }
        .confirm-btn-right { width: 120px; height: 50px; } 
        .confirm-btn-right:active { transform: translateY(4px); }
        .confirm-btn-right .key-btn { width: 100%; height: 100%; margin-bottom: 0; }

        /* 棕色底座 */
        .btn-container { background-color: #2b201c; padding: 8px; border-radius: 8px; border: 1px solid #1a1210; display: grid; }
        
        button.key-btn { 
            background: linear-gradient(180deg, #444 0%, #222 100%); 
            color: #fff; 
            border: 1px solid #111; 
            border-radius: 6px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 0 #0d0d0d; 
            transition: transform 0.05s, box-shadow 0.05s, background 0.05s;
            margin-bottom: 6px; 
        }
        
        button.key-btn:active { 
            transform: translateY(4px); 
            box-shadow: 0 0 0 #0d0d0d; 
            background: linear-gradient(180deg, #222 0%, #111 100%); 
        }

        /* 字母区域：5列网格，包含A-Z, DCT, DEL */
        #letter-grid { grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 8px; }
        #letter-grid button { height: 40px; }
        .btn-span-2 { grid-column: span 2; } /* DCT 和 DEL 专属样式：占两格宽度 */
        
        /* 专属红/琥珀色删除键样式 */
        .btn-del { color: #ff4d4d !important; border-top: 1px solid #662222 !important; background: linear-gradient(180deg, #3a1a1a 0%, #1a0a0a 100%) !important; }
        .btn-del:active { background: linear-gradient(180deg, #1a0a0a 0%, #0a0000 100%) !important; }

        .dct-icon { width: 35px; height: 25px; }

        /* 数字与方向组合区域 */
        #bottom-input-area { display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px; flex: 1; }
        #num-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
        #num-grid button { height: 50px; } 
        #d-pad { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 5px; }
        .d-up { grid-column: 2; grid-row: 1; }
        .d-left { grid-column: 1; grid-row: 2; }
        .d-right { grid-column: 3; grid-row: 2; }
        .d-down { grid-column: 2; grid-row: 3; }

        /* --- 响应式悬浮窗/分屏状态 (极致窄屏适配) --- */
        @media (max-width: 800px) {
            body { flex-direction: column; height: 100vh; }
            #left-half { width: 100vw; height: 40vh; border-right: none; border-bottom: 2px solid #222; }
            #top-area { height: 50%; } 
            
            #bottom-area { height: 50%; overflow: hidden; }
            #log-list { padding: 4px 10px; padding-bottom: 10px; gap: 4px; overflow: hidden; }
            .log-item { padding: 4px 8px; border-left-width: 2px; } 
            .log-cmd { font-size: 14px; }
            .form-row { margin-bottom: 4px; padding-bottom: 4px; }
            .form-label { font-size: 14px; }
            .form-input { padding: 4px; font-size: 14px; height: 20px; width: 70px; }
            .calc-result { font-size: 16px; width: 70px; }

            /* 窄屏下压缩右半部键盘区 */
            #right-half { width: 100vw; height: 60vh; padding: 6px; padding-bottom: env(safe-area-inset-bottom); justify-content: start; }
            
            .draft-action-bar { height: 42px; gap: 6px; margin-bottom: 8px; }
            #draft-bar { height: 100%; font-size: 20px; padding: 0 10px; }
            .confirm-btn-right { width: 90px; height: 100%; }
            .confirm-btn-right .key-btn { margin-bottom: 0; box-shadow: 0 3px 0 #0d0d0d; font-size: 16px; }

            .btn-container { padding: 6px; border-radius: 6px; }
            
            #letter-grid { gap: 5px; margin-bottom: 6px; }
            #letter-grid button { height: 32px; font-size: 16px; margin-bottom: 2px; box-shadow: 0 3px 0 #0d0d0d; }
            #letter-grid button:active { transform: translateY(3px); }

            #bottom-input-area { gap: 6px; }
            #num-grid { gap: 5px; }
            #num-grid button { height: 42px; margin-bottom: 2px; box-shadow: 0 3px 0 #0d0d0d; }
            #num-grid button:active { transform: translateY(3px); }
            
            #d-pad { gap: 4px; }
            .dct-icon { width: 28px; height: 20px; }
            .copyright-watermark { display: none; }
        }
    </style>
</head>
<body>

    <div id="left-half">
        <div id="top-area">
            <div class="tab-header">
                <div class="idu-logo">IDU6</div>
                <button id="btn-overview" class="tab-btn active" onclick="switchTab('overview')">Overview</button>
                <button id="btn-takeoff" class="tab-btn" onclick="switchTab('takeoff')">Takeoff</button>
                <button id="btn-landing" class="tab-btn" onclick="switchTab('landing')">Landing</button>
            </div>
            <div class="tab-content">
                <div id="pane-overview" class="pane active">
                    <div class="form-row">
                        <span class="form-label">Flight No.</span>
                        <input type="text" id="flt-no" class="form-input clearable" placeholder="MU1234" style="text-transform: uppercase;">
                    </div>
                    <div class="form-row">
                        <span class="form-label">Transponder</span>
                        <input type="number" id="transponder" class="form-input clearable" placeholder="0000">
                    </div>
                    <div class="form-row">
                        <span class="form-label">Est Landing Fuel</span>
                        <input type="number" id="est-fuel" class="form-input clearable" placeholder="Tons">
                    </div>
                </div>

                <div id="pane-takeoff" class="pane">
                    <div class="form-row">
                        <span class="form-label">V1 / VR / V2 (Kts)</span>
                        <div style="display:flex; gap:5px;">
                            <input type="number" class="form-input clearable" style="width:40px;" placeholder="V1">
                            <input type="number" class="form-input clearable" style="width:40px;" placeholder="VR">
                            <input type="number" class="form-input clearable" style="width:40px;" placeholder="V2">
                        </div>
                    </div>
                    <div class="form-row">
                        <span class="form-label">Takeoff Weight (Tons)</span>
                        <input type="number" id="to-weight" class="form-input clearable" placeholder="TOW" oninput="calcTakeoff()">
                    </div>
                    <div class="form-row">
                        <span class="form-label">VF0</span>
                        <div id="to-vf0" class="calc-result">---</div>
                    </div>
                </div>

                <div id="pane-landing" class="pane">
                    <div class="form-row">
                        <span class="form-label">Landing Weight (Tons)</span>
                        <input type="number" id="ld-weight" class="form-input clearable" placeholder="LDW" oninput="calcLanding()">
                    </div>
                    <div class="form-row">
                        <span class="form-label">VREF + Δ = VAPP</span>
                        <div style="display:flex; gap:5px; align-items:center;">
                            <input type="number" id="vref" class="form-input clearable" style="width:42px; text-align:center; padding:6px 2px;" placeholder="REF" oninput="calcLanding()">
                            <span style="color:#555; font-weight:bold;">+</span>
                            <input type="number" id="wind-corr" class="form-input clearable" style="width:36px; text-align:center; padding:6px 2px;" placeholder="Δ" oninput="calcLanding()">
                            <span style="color:#555; font-weight:bold; margin:0 2px;">=</span>
                            <div id="vapp-speed" class="calc-result" style="color:#00e5ff; width:45px; text-align:right;">---</div>
                        </div>
                    </div>
                    <div class="form-row">
                        <span class="form-label">VF0 Speed</span>
                        <div id="ga-vf0" class="calc-result">---</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="bottom-area">
            <div class="log-title">
                <span>COMMAND LOG</span>
                <button class="reset-btn" onclick="packAndReset()">Pack & Reset</button>
            </div>
            <div id="log-list"></div>
            <div class="copyright-watermark">© IDU6 FLIGHT SYSTEM</div>
        </div>
    </div>

    <div id="right-half">
        
        <div class="draft-action-bar">
            <div id="draft-bar"></div>
            <div class="confirm-btn-right">
                <button class="key-btn confirm-btn" onclick="confirmInput()">CONFIRM</button>
            </div>
        </div>

        <div id="letter-grid" class="btn-container">
            </div>

        <div id="bottom-input-area">
            <div id="num-grid" class="btn-container"></div>
            <div id="d-pad" class="btn-container">
                <button class="key-btn d-up" onclick="addText('↑')">↑</button>
                <button class="key-btn d-left" onclick="addText('←')">←</button>
                <button class="key-btn d-right" onclick="addText('→')">→</button>
                <button class="key-btn d-down" onclick="addText('↓')">↓</button>
            </div>
        </div>
    </div>

    <script>
        function getVF0(weight) {
            if (!weight || weight <= 0) return "---";
            let speed = (weight * 2) + 70;
            return speed > 210 ? 210 : Math.round(speed);
        }

        function calcTakeoff() {
            const weight = parseFloat(document.getElementById('to-weight').value);
            document.getElementById('to-vf0').innerText = getVF0(weight);
        }

        function calcLanding() {
            const weight = parseFloat(document.getElementById('ld-weight').value);
            document.getElementById('ga-vf0').innerText = getVF0(weight);

            const vref = parseFloat(document.getElementById('vref').value) || 0;
            const delta = parseFloat(document.getElementById('wind-corr').value) || 0;
            if (vref > 0) {
                document.getElementById('vapp-speed').innerText = vref + delta;
            } else {
                document.getElementById('vapp-speed').innerText = "---";
            }
        }

        function packAndReset() {
            const msg = "注意：点击确认将把本次 IDU6 中的飞行记录保存为文本文件至本地，并重置面板中的所有信息。\n\n是否确认执行 Pack & Reset？";
            if(confirm(msg)) {
                let logData = "====== IDU6 FLIGHT RECORD ======\n";
                logData += "Date: " + new Date().toLocaleDateString() + "\n\n";
                
                let rawFltNo = document.getElementById('flt-no').value.trim().toUpperCase();
                let safeFltNo = rawFltNo === "" ? "UNKNOWN" : rawFltNo;
                
                logData += "[ PRE-FLIGHT ]\n";
                logData += "Flight No: " + safeFltNo + "\n";
                logData += "Transponder: " + (document.getElementById('transponder').value || "N/A") + "\n";
                logData += "Est Landing Fuel: " + (document.getElementById('est-fuel').value || "N/A") + " Tons\n\n";
                
                logData += "[ COMMAND LOG ]\n";
                const logItems = document.querySelectorAll('.log-item');
                if (logItems.length === 0) {
                    logData += "No commands recorded.\n";
                } else {
                    let arr = Array.from(logItems).reverse();
                    arr.forEach(item => {
                        let time = item.querySelector('.log-time').innerText;
                        let cmd = item.querySelector('.log-cmd').innerText;
                        logData += time + " | " + cmd + "\n";
                    });
                }
                
                const today = new Date();
                const yyyy = today.getFullYear();
                const mm = String(today.getMonth() + 1).padStart(2, '0');
                const dd = String(today.getDate()).padStart(2, '0');
                const dateString = `${yyyy}${mm}${dd}`;
                const fileName = `IDU6_${safeFltNo}_${dateString}.txt`;

                const blob = new Blob([logData], { type: "text/plain;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                a.click();
                URL.revokeObjectURL(url);

                document.querySelectorAll('.clearable').forEach(input => input.value = "");
                document.getElementById('to-vf0').innerText = "---";
                document.getElementById('ga-vf0').innerText = "---";
                document.getElementById('vapp-speed').innerText = "---";
                document.getElementById('log-list').innerHTML = "";
                currentInput = "";
                updateDraftBar();
            }
        }

        let currentInput = "";
        const draftBar = document.getElementById('draft-bar');

        function updateDraftBar() {
            draftBar.innerText = currentInput === "" ? '\u200B' : currentInput;
        }

        // --- 核心更新：JS 动态生成完整的字母+功能网格 ---
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split(""); // 完整的 A-Z
        const letterGrid = document.getElementById('letter-grid');
        
        // 生成 26 个字母键，Z 现在自动成为等大小的按键
        letters.forEach(l => {
            const btn = document.createElement('button');
            btn.className = "key-btn";
            btn.innerText = l;
            btn.onclick = () => addText(l);
            letterGrid.appendChild(btn);
        });

        // 紧接着 Z 之后插入占两格的 Direct To
        const dctBtn = document.createElement('button');
        dctBtn.className = "key-btn btn-span-2";
        dctBtn.innerHTML = `
            <svg class="dct-icon" viewBox="0 0 40 30">
                <text x="2" y="24" font-family="Arial" font-weight="bold" font-size="28" fill="white">D</text>
                <line x1="0" y1="15" x2="35" y2="15" stroke="white" stroke-width="3" />
                <polygon points="32,10 40,15 32,20" fill="white" />
            </svg>`;
        dctBtn.onclick = () => addText(' Direct To ');
        letterGrid.appendChild(dctBtn);

        // 最后插入占两格且带特殊样式的 DEL
        const delBtn = document.createElement('button');
        delBtn.className = "key-btn btn-span-2 btn-del";
        delBtn.innerText = "DEL";
        delBtn.onclick = () => backspace();
        letterGrid.appendChild(delBtn);

        // 生成数字键
        const nums = ["1","2","3","4","5","6","7","8","9",".","0"];
        const numGrid = document.getElementById('num-grid');
        nums.forEach(n => {
            const btn = document.createElement('button');
            btn.className = "key-btn";
            btn.innerText = n;
            btn.onclick = () => addText(n);
            numGrid.appendChild(btn);
        });

        function addText(char) {
            currentInput += char;
            updateDraftBar();
        }

        function backspace() {
            currentInput = currentInput.slice(0, -1);
            updateDraftBar();
        }

        function confirmInput() {
            if (currentInput.trim() === "") return; 
            const now = new Date();
            const timeStr = String(now.getHours()).padStart(2, '0') + ":" + 
                            String(now.getMinutes()).padStart(2, '0') + ":" + 
                            String(now.getSeconds()).padStart(2, '0');
            const logEntry = `
                <div class="log-item">
                    <span class="log-cmd">${currentInput}</span>
                    <span class="log-time">${timeStr}</span>
                </div>
            `;
            document.getElementById('log-list').insertAdjacentHTML('afterbegin', logEntry);
            currentInput = "";
            updateDraftBar();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.pane').forEach(pane => pane.classList.remove('active'));
            document.getElementById('btn-' + tabId).classList.add('active');
            document.getElementById('pane-' + tabId).classList.add('active');
        }

        updateDraftBar();
    </script>
</body>
</html>
